apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  labels:
    app.kubernetes.io/name: frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: frontend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: frontend
    spec:
      terminationGracePeriodSeconds: 10
      containers:
        - name: frontend
          image: docker.io/votingapp/frontend:dev
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 2
            periodSeconds: 5
          resources:
            requests:
              cpu: 25m
              memory: 32Mi
            limits:
              cpu: 200m
              memory: 128Mi
          # nginx writes pid + temp files at runtime; tmpfs covers it.
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: false   # nginx:1.27-alpine wants root for port binding
            capabilities:
              drop: ["ALL"]
              add: ["NET_BIND_SERVICE"]
