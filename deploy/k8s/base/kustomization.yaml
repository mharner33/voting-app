apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: voting-app

commonLabels:
  app.kubernetes.io/part-of: voting-app

resources:
  - namespace.yaml
  - postgres/statefulset.yaml
  - postgres/service.yaml

configMapGenerator:
  - name: app-config
    envs:
      - config/app-config.env

generatorOptions:
  disableNameSuffixHash: false
