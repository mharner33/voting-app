apiVersion: apps/v1
kind: Deployment
metadata:
  name: tally-worker
  labels:
    app.kubernetes.io/name: tally-worker
spec:
  replicas: 1
  strategy:
    type: Recreate              # never two workers at once
  selector:
    matchLabels:
      app.kubernetes.io/name: tally-worker
  template:
    metadata:
      labels:
        app.kubernetes.io/name: tally-worker
        tags.datadoghq.com/service: tally-worker
      annotations:
        ad.datadoghq.com/tally-worker.logs: |
          [{"source":"go","service":"tally-worker"}]
    spec:
      serviceAccountName: tally-worker
      terminationGracePeriodSeconds: 30
      containers:
        - name: tally-worker
          image: docker.io/votingapp/tally-worker:dev
          imagePullPolicy: IfNotPresent
          env:
            - name: POSTGRES_DSN
              valueFrom:
                secretKeyRef:
                  name: postgres-credentials
                  key: POSTGRES_DSN
            - name: TALLY_INTERVAL
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: TALLY_INTERVAL
            - name: DD_SERVICE
              value: tally-worker
            - name: DD_AGENT_HOST
              valueFrom:
                fieldRef:
                  fieldPath: status.hostIP
            - name: DD_ENV
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: DD_ENV
            - name: DD_VERSION
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: DD_VERSION
            - name: DD_TRACE_AGENT_PORT
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: DD_TRACE_AGENT_PORT
            - name: DD_DOGSTATSD_PORT
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: DD_DOGSTATSD_PORT
          resources:
            requests:
              cpu: 25m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 256Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            capabilities:
              drop: ["ALL"]
