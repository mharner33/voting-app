services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 2s
      timeout: 2s
      retries: 10

  migrate:
    image: migrate/migrate:v4.17.1
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./migrations:/migrations:ro
    command:
      - "-path=/migrations"
      - "-database=postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?sslmode=disable"
      - "up"
    restart: "no"

  vote-api:
    build:
      context: .
      dockerfile: vote-api/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    environment:
      HTTP_ADDR: ":8080"
      POSTGRES_DSN: "postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?sslmode=disable"
      DD_SERVICE: "vote-api"
      DD_ENV: "${DD_ENV}"
      DD_VERSION: "${DD_VERSION}"
      DD_AGENT_HOST: "datadog-agent"
      DD_TRACE_AGENT_PORT: "8126"
      DD_DOGSTATSD_PORT: "8125"
    ports:
      - "8081:8080"
    labels:
      com.datadoghq.ad.logs: '[{"source":"go","service":"vote-api"}]'

  tally-worker:
    build:
      context: .
      dockerfile: tally-worker/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    environment:
      POSTGRES_DSN: "postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?sslmode=disable"
      TALLY_INTERVAL: "${TALLY_INTERVAL}"
      DD_SERVICE: "tally-worker"
      DD_ENV: "${DD_ENV}"
      DD_VERSION: "${DD_VERSION}"
      DD_AGENT_HOST: "datadog-agent"
      DD_TRACE_AGENT_PORT: "8126"
      DD_DOGSTATSD_PORT: "8125"
    labels:
      com.datadoghq.ad.logs: '[{"source":"go","service":"tally-worker"}]'

  results-api:
    build:
      context: .
      dockerfile: results-api/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    environment:
      HTTP_ADDR: ":8080"
      POSTGRES_DSN: "postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?sslmode=disable"
      DD_SERVICE: "results-api"
      DD_ENV: "${DD_ENV}"
      DD_VERSION: "${DD_VERSION}"
      DD_AGENT_HOST: "datadog-agent"
      DD_TRACE_AGENT_PORT: "8126"
      DD_DOGSTATSD_PORT: "8125"
    ports:
      - "8082:8080"
    labels:
      com.datadoghq.ad.logs: '[{"source":"go","service":"results-api"}]'

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    ports:
      - "8080:8080"
    depends_on:
      - vote-api
      - results-api

volumes:
  pgdata:
