services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      DD_POSTGRES_USER: ${DD_POSTGRES_USER}
      DD_POSTGRES_PASSWORD: ${DD_POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./scripts/postgres-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 2s
      timeout: 2s
      retries: 10

  migrate:
    image: migrate/migrate:v4.17.1
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./migrations:/migrations:ro
    command:
      - "-path=/migrations"
      - "-database=postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?sslmode=disable"
      - "up"
    restart: "no"

  vote-api:
    build:
      context: .
      dockerfile: vote-api/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      datadog-agent:
        condition: service_started
    environment:
      HTTP_ADDR: ":8080"
      POSTGRES_DSN: "postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?sslmode=disable"
      DD_SERVICE: "vote-api"
      DD_ENV: "${DD_ENV}"
      DD_VERSION: "${DD_VERSION}"
      DD_AGENT_HOST: "datadog-agent"
      DD_TRACE_AGENT_PORT: "8126"
      DD_DOGSTATSD_PORT: "8125"
    ports:
      - "8081:8080"
    labels:
      com.datadoghq.ad.logs: '[{"source":"go","service":"vote-api"}]'

  tally-worker:
    build:
      context: .
      dockerfile: tally-worker/Dockerfile
    profiles: ["baseline"]
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      datadog-agent:
        condition: service_started
    environment:
      POSTGRES_DSN: "postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?sslmode=disable"
      TALLY_INTERVAL: "${TALLY_INTERVAL}"
      DD_SERVICE: "tally-worker"
      DD_ENV: "${DD_ENV}"
      DD_VERSION: "${DD_VERSION}"
      DD_AGENT_HOST: "datadog-agent"
      DD_TRACE_AGENT_PORT: "8126"
      DD_DOGSTATSD_PORT: "8125"
    labels:
      com.datadoghq.ad.logs: '[{"source":"go","service":"tally-worker"}]'

  results-api:
    build:
      context: .
      dockerfile: results-api/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      datadog-agent:
        condition: service_started
    environment:
      HTTP_ADDR: ":8080"
      POSTGRES_DSN: "postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?sslmode=disable"
      DD_SERVICE: "results-api"
      DD_ENV: "${DD_ENV}"
      DD_VERSION: "${DD_VERSION}"
      DD_AGENT_HOST: "datadog-agent"
      DD_TRACE_AGENT_PORT: "8126"
      DD_DOGSTATSD_PORT: "8125"
    ports:
      - "8082:8080"
    labels:
      com.datadoghq.ad.logs: '[{"source":"go","service":"results-api"}]'

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    depends_on:
      - vote-api
      - results-api
    environment:
      VOTING_CHOICES: "${VOTING_CHOICES:-tacos,burritos}"
      VOTING_POLL_ID: "${VOTING_POLL_ID:-default}"
      VOTING_HEADING: "${VOTING_HEADING:-Default poll: choose one.}"
    ports:
      - "8080:8080"

  datadog-agent:
    image: gcr.io/datadoghq/agent:7
    environment:
      DD_API_KEY: "${DD_API_KEY}"
      DD_SITE: "${DD_SITE}"
      # Skip hostname auto-detection (the podman-machine setup has no usable
      # docker socket, so the agent otherwise exits with "unable to reliably
      # determine the host name").
      DD_HOSTNAME: "voting-app-local"
      DD_APM_ENABLED: "true"
      DD_APM_NON_LOCAL_TRAFFIC: "true"
      DD_DOGSTATSD_NON_LOCAL_TRAFFIC: "true"
      DD_LOGS_ENABLED: "true"
      DD_LOGS_CONFIG_CONTAINER_COLLECT_ALL: "true"
      DD_CONTAINER_EXCLUDE: "name:datadog-agent"
      DD_ENV: "${DD_ENV}"
      DD_TAGS: "demo:voting-app env:${DD_ENV}"
    volumes:
      # Rootless podman: expose the user socket at the path the agent expects.
      - /run/user/1000/podman/podman.sock:/var/run/docker.sock:ro
      - /proc/:/host/proc/:ro
      - /sys/fs/cgroup/:/host/sys/fs/cgroup:ro
      # Postgres integration. Autodiscovery via container labels doesn't work
      # under podman-machine (the agent can't read the docker socket), so
      # configure the check statically. ${VAR} placeholders are expanded from
      # the agent container's environment at load time.
      - ./datadog/postgres.d/conf.yaml:/etc/datadog-agent/conf.d/postgres.d/conf.yaml:ro
      - ./datadog/openmetrics.d/conf.yaml:/etc/datadog-agent/conf.d/openmetrics.d/conf.yaml:ro
    ports:
      - "8125:8125/udp"
      - "8126:8126"

  temporal-postgres:
    image: postgres:16-alpine
    profiles: ["temporal"]
    environment:
      POSTGRES_USER: temporal
      POSTGRES_PASSWORD: temporal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U temporal"]
      interval: 2s
      timeout: 2s
      retries: 15

  temporal:
    image: temporalio/auto-setup:1.29
    profiles: ["temporal"]
    depends_on:
      temporal-postgres:
        condition: service_healthy
    environment:
      DB: postgres12
      DB_PORT: 5432
      POSTGRES_USER: temporal
      POSTGRES_PWD: temporal
      POSTGRES_SEEDS: temporal-postgres
      PROMETHEUS_ENDPOINT: "0.0.0.0:9090"
      TEMPORAL_ADDRESS: "temporal:7233"
    ports:
      - "7233:7233"
      - "9090:9090"
    healthcheck:
      test: ["CMD", "tctl", "--address", "temporal:7233", "cluster", "health"]
      interval: 5s
      timeout: 5s
      retries: 30

  temporal-ui:
    image: temporalio/ui:2.49.1
    profiles: ["temporal"]
    environment:
      TEMPORAL_ADDRESS: "temporal:7233"
      TEMPORAL_CORS_ORIGINS: "http://localhost:8233"
    ports:
      - "8233:8080"
    depends_on:
      temporal:
        condition: service_healthy

  tally-worker-temporal:
    build:
      context: .
      dockerfile: tally-worker-temporal/Dockerfile
    profiles: ["temporal"]
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      datadog-agent:
        condition: service_started
      temporal:
        condition: service_healthy
    environment:
      POSTGRES_DSN: "postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?sslmode=disable"
      TALLY_INTERVAL: "${TALLY_INTERVAL}"
      TEMPORAL_HOST_PORT: "temporal:7233"
      TEMPORAL_NAMESPACE: "${TEMPORAL_NAMESPACE}"
      TEMPORAL_TASK_QUEUE: "tally-task-queue"
      DD_SERVICE: "tally-worker-temporal"
      DD_ENV: "${DD_ENV}"
      DD_VERSION: "${DD_VERSION}"
      DD_AGENT_HOST: "datadog-agent"
      DD_TRACE_AGENT_PORT: "8126"
      DD_DOGSTATSD_PORT: "8125"
    labels:
      com.datadoghq.ad.logs: '[{"source":"go","service":"tally-worker-temporal"}]'

volumes:
  pgdata:
