server {
  listen 8080 default_server;
  root /usr/share/nginx/html;
  index index.html;

  # Same-origin API routing. In k8s the Ingress beats nginx to /vote and /results,
  # so these blocks only fire in docker-compose (where they reach the sibling services).
  location = /vote {
    proxy_pass http://vote-api:8080/vote;
    proxy_set_header Host $host;
  }
  location = /results {
    proxy_pass http://results-api:8080/results;
    proxy_set_header Host $host;
  }

  location / {
    try_files $uri $uri/ =404;
  }
}
